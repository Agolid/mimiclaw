name: Build

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  idf-build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download esp_websocket_client
        run: |
          cd $IDF_PATH/components
          git clone --depth 1 --branch master https://github.com/espressif/esp-protocols.git esp_websocket_client_component
          cp -r esp_websocket_client_component/esp_websocket_client/* esp_websocket_client/
          rm -rf esp_websocket_client_component

      - name: Build firmware (ESP32-S3)
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32s3
          idf.py fullclean
          idf.py build
