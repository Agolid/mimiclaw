name: Build

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  idf-build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download esp_websocket_client
        run: |
          git clone --depth 1 --branch master https://github.com/espressif/esp-protocols.git /tmp/esp-protocols
          mkdir -p $IDF_PATH/components/esp_websocket_client
          cp -r /tmp/esp-protocols/components/esp_websocket_client/* $IDF_PATH/components/esp_websocket_client/

      - name: Build firmware (ESP32-S3)
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32s3
          idf.py fullclean
          idf.py build
